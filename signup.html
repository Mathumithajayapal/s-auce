<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Scorza | Create Account</title>
  <!-- Tailwind CSS v3 + Font Awesome + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#e69d0b',
              light: '#f0b341',
              dark: '#d48a0a',
            },
            darkBg: '#000000',
            darkCard: '#1a1a1a',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.6s ease-out',
            'float-slow': 'float 6s ease-in-out infinite',
            'gentle-pulse': 'gentlePulse 3s ease-in-out infinite',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            gentlePulse: {
              '0%, 100%': { opacity: '0.3' },
              '50%': { opacity: '0.6' },
            },
          },
        },
      },
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      transition: background-color 0.2s ease, color 0.2s ease;
      height: 100vh;
      overflow: hidden;
    }
    /* DARK MODE - FULL BLACK BACKGROUND */
    body.dark {
      background-color: #000000 !important;
    }
    body.dark .fixed.inset-0 {
      opacity: 0.4;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      border: 1px solid rgba(230, 157, 11, 0.15);
    }
    /* Dark mode card - dark gray/black color */
    body.dark .glass-card {
      background: #121212 !important;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(230, 157, 11, 0.25);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .input-focus-ring:focus {
      box-shadow: 0 0 0 3px rgba(230, 157, 11, 0.35);
      border-color: #e69d0b;
      outline: none;
    }
    .brand-gradient-bg {
      background: linear-gradient(125deg, #e69d0b 0%, #f0b341 100%);
      background-size: 200% auto;
      transition: 0.3s;
    }
    .brand-gradient-bg:hover {
      background-position: right center;
    }
    .brand-glow {
      box-shadow: 0 15px 30px -12px rgba(230, 157, 11, 0.35);
    }
    /* RTL fine-tuning */
    [dir="rtl"] .slide-icon {
      transform: scaleX(-1);
    }
    [dir="rtl"] .text-left {
      text-align: right;
    }
    [dir="rtl"] .ml-2 {
      margin-left: 0;
      margin-right: 0.5rem;
    }
    [dir="rtl"] .mr-2 {
      margin-right: 0;
      margin-left: 0.5rem;
    }
    [dir="rtl"] .pl-11 {
      padding-left: 1rem;
      padding-right: 2.75rem;
    }
    [dir="rtl"] .absolute.right-3 {
      right: auto;
      left: 0.75rem;
    }
    [dir="rtl"] .left-3 {
      left: auto;
      right: 0.75rem;
    }
    ::-webkit-scrollbar {
      width: 0;
      background: transparent;
    }
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    @media (min-width: 768px) {
      .login-container {
        padding: 0;
      }
    }
    /* Dark mode text overrides */
    body.dark .text-gray-500,
    body.dark .text-gray-600,
    body.dark .text-gray-700,
    body.dark .text-gray-800,
    body.dark .text-gray-900 {
      color: #e5e5e5 !important;
    }
    body.dark .text-gray-400 {
      color: #9ca3af !important;
    }
    body.dark input::placeholder {
      color: #6b7280 !important;
    }
    /* Dark mode input fields */
    body.dark input {
      background-color: #1e1e1e !important;
      border-color: #333333 !important;
      color: #ffffff !important;
    }
    body.dark input:focus {
      border-color: #e69d0b !important;
    }
    /* Dark mode divider text background */
    body.dark .bg-white {
      background-color: #121212 !important;
    }
    body.dark .border-gray-200 {
      border-color: #2a2a2a !important;
    }
    /* Dark mode social buttons */
    body.dark .border-gray-300 {
      border-color: #333333 !important;
    }
    body.dark .bg-gray-50 {
      background-color: #1e1e1e !important;
    }
    body.dark .bg-white\/70 {
      background-color: rgba(26, 26, 35, 0.8) !important;
    }
  </style>
</head>
<body class="bg-white dark:bg-darkBg text-gray-900 dark:text-gray-100 font-sans antialiased overflow-hidden">

  <!-- Premium animated background layers - softer in dark mode -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-0 -left-40 w-96 h-96 bg-brand-primary/10 dark:bg-brand-primary/15 rounded-full blur-3xl animate-float-slow"></div>
    <div class="absolute bottom-0 right-0 w-[32rem] h-[32rem] bg-brand-light/10 dark:bg-brand-light/15 rounded-full blur-3xl animate-float-slow" style="animation-delay: -2s;"></div>
    <div class="absolute top-1/3 left-1/4 w-80 h-80 bg-brand-primary/5 dark:bg-brand-primary/8 rounded-full blur-2xl animate-gentle-pulse"></div>
    <div class="absolute bottom-1/4 right-1/3 w-64 h-64 bg-brand-primary/8 dark:bg-brand-primary/10 rounded-full blur-2xl animate-float-slow" style="animation-delay: -4s;"></div>
  </div>

  <!-- Controls ONLY: RTL Toggle + Theme Toggle - Positioned at top right -->
  <div class="fixed top-5 right-5 z-50 flex items-center gap-3">
    <button id="rtlToggleBtn" class="px-4 py-2 rounded-full text-sm font-semibold bg-white/70 dark:bg-gray-800/80 backdrop-blur-sm border border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-200 hover:bg-brand-primary hover:text-white hover:border-transparent transition-all shadow-sm flex items-center gap-2">
      <span id="rtlToggleLabel">RTL</span>
      <i class="fas fa-arrow-right-arrow-left text-xs opacity-80"></i>
    </button>
    <button id="themeToggleBtn" class="w-10 h-10 rounded-full flex items-center justify-center bg-white/70 dark:bg-gray-800/80 backdrop-blur-sm border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-200 hover:bg-brand-primary hover:text-white hover:border-transparent transition-all text-xl shadow-sm">
      🌙
    </button>
  </div>

  <!-- Main Signup Section - CENTERED, NO SCROLLING, REDUCED CARD HEIGHT -->
  <div class="login-container">
    <div class="w-full max-w-md animate-fade-in-up">
      
      <!-- Signup Card - SCORZA LOGO INSIDE, COMPACT PADDING, DARK MODE DARK GRAY CARD -->
      <div class="glass-card rounded-2xl shadow-2xl p-5 md:p-6 transition-all duration-300">
        
        <!-- Scorza Logo Inside Card (compact, centered) -->
        <div class="flex flex-col items-center justify-center mb-4">
         
        <div class="flex items-center gap-1.5">
  <a href="index.html" class="text-2xl md:text-3xl font-extrabold tracking-tight text-brand-primary hover:opacity-90 transition">
    Scorza
  </a>
</div>
          <p class="text-gray-500 dark:text-gray-400 text-xs mt-1">Create your account</p>
        </div>
        
        <!-- Divider line (thin) -->
        <div class="relative my-3">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
          </div>
          <div class="relative flex justify-center text-xs">
            <span class="bg-white dark:bg-[#121212] px-2 text-gray-500 dark:text-gray-400 text-[10px]">Get Started</span>
          </div>
        </div>

        <!-- Signup Form (compact spacing) -->
        <form id="signupForm" action="#" method="POST">
          <!-- Full Name Field -->
          <div class="mb-3">
            <label for="fullname" class="block text-xs font-semibold text-gray-700 dark:text-gray-300 mb-1">
              <i class="fas fa-user mr-1 text-brand-primary text-xs"></i> Full Name
            </label>
            <div class="relative">
              <i class="fas fa-user-circle absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-xs"></i>
              <input type="text" id="fullname" name="fullname" required 
                class="w-full pl-9 pr-3 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-primary/40 focus:border-brand-primary transition-all input-focus-ring"
                placeholder="Alex Morgan">
            </div>
            <p id="fullnameError" class="text-red-500 text-[10px] mt-0.5 hidden"><i class="fas fa-exclamation-circle mr-1"></i>Full name required</p>
          </div>

          <!-- Email Field -->
          <div class="mb-3">
            <label for="email" class="block text-xs font-semibold text-gray-700 dark:text-gray-300 mb-1">
              <i class="fas fa-envelope mr-1 text-brand-primary text-xs"></i> Email Address
            </label>
            <div class="relative">
              <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-xs"></i>
              <input type="email" id="email" name="email" required 
                class="w-full pl-9 pr-3 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-primary/40 focus:border-brand-primary transition-all input-focus-ring"
                placeholder="hello@scorza.com">
            </div>
            <p id="emailError" class="text-red-500 text-[10px] mt-0.5 hidden"><i class="fas fa-exclamation-circle mr-1"></i>Valid email required</p>
          </div>

          <!-- Password Field -->
          <div class="mb-3">
            <label for="password" class="block text-xs font-semibold text-gray-700 dark:text-gray-300 mb-1">
              <i class="fas fa-lock mr-1 text-brand-primary text-xs"></i> Password
            </label>
            <div class="relative">
              <i class="fas fa-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-xs"></i>
              <input type="password" id="password" name="password" required
                class="w-full pl-9 pr-10 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-primary/40 focus:border-brand-primary input-focus-ring"
                placeholder="Create a strong password">
              <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 hover:text-brand-primary transition text-xs">
                <i class="fas fa-eye-slash"></i>
              </button>
            </div>
            <p id="passwordError" class="text-red-500 text-[10px] mt-0.5 hidden"><i class="fas fa-exclamation-circle mr-1"></i>Password must be at least 6 characters</p>
          </div>

          <!-- Confirm Password Field -->
          <div class="mb-3">
            <label for="confirmPassword" class="block text-xs font-semibold text-gray-700 dark:text-gray-300 mb-1">
              <i class="fas fa-check-circle mr-1 text-brand-primary text-xs"></i> Confirm Password
            </label>
            <div class="relative">
              <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-xs"></i>
              <input type="password" id="confirmPassword" name="confirmPassword" required
                class="w-full pl-9 pr-10 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-primary/40 focus:border-brand-primary input-focus-ring"
                placeholder="Confirm your password">
              <button type="button" id="toggleConfirmPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 hover:text-brand-primary transition text-xs">
                <i class="fas fa-eye-slash"></i>
              </button>
            </div>
            <p id="confirmError" class="text-red-500 text-[10px] mt-0.5 hidden"><i class="fas fa-exclamation-circle mr-1"></i>Passwords do not match</p>
          </div>

          <!-- Terms & Conditions Checkbox -->
          <div class="mb-4">
            <label class="flex items-start gap-1.5 text-xs text-gray-600 dark:text-gray-400 cursor-pointer">
              <input type="checkbox" id="termsCheckbox" class="w-3.5 h-3.5 mt-0.5 rounded border-gray-300 dark:border-gray-600 text-brand-primary focus:ring-brand-primary/30">
              <span>I agree to the <a href="#" class="text-brand-primary hover:underline font-medium">Terms</a> & <a href="#" class="text-brand-primary hover:underline font-medium">Privacy</a></span>
            </label>
            <p id="termsError" class="text-red-500 text-[10px] mt-0.5 hidden"><i class="fas fa-exclamation-circle mr-1"></i>You must agree to the terms</p>
          </div>

          <!-- Submit Button -->
          <button type="submit" id="submitBtn" class="w-full brand-gradient-bg text-white font-bold py-2.5 rounded-xl shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-2 group text-sm">
            <span>Create Account</span>
            <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform slide-icon text-xs"></i>
          </button>

          <!-- Divider -->
          <div class="my-4 flex items-center gap-3">
            <div class="flex-1 h-px bg-gray-300 dark:bg-gray-700"></div>
            <span class="text-[10px] text-gray-500 dark:text-gray-400">or sign up with</span>
            <div class="flex-1 h-px bg-gray-300 dark:bg-gray-700"></div>
          </div>

          <!-- Social Signup Buttons (compact) -->
          <div class="grid grid-cols-2 gap-3">
            <button type="button" class="flex items-center justify-center gap-2 py-2 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all text-xs font-medium">
              <i class="fab fa-google text-red-500 text-xs"></i> Google
            </button>
            <button type="button" class="flex items-center justify-center gap-2 py-2 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all text-xs font-medium">
              <i class="fab fa-apple text-xs"></i> Apple
            </button>
          </div>

          <!-- Sign in link -->
          <p class="text-center text-xs text-gray-500 dark:text-gray-400 mt-4">
            Already have an account? 
            <a href="login.html" class="font-semibold text-brand-primary hover:underline ml-1">Sign in</a>
          </p>
        </form>
      </div>
      <!-- NO FOOTER, NO DEMO HINT, NO OUTSIDE CARD CONTENT -->
    </div>
  </div>

  <script>
    // ------------------- THEME TOGGLE -------------------
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    function setThemeUI(isDark) {
      if (themeToggleBtn) themeToggleBtn.textContent = isDark ? '☀️' : '🌙';
    }
    function toggleTheme() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      setThemeUI(isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    if (themeToggleBtn) themeToggleBtn.addEventListener('click', toggleTheme);
    
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      setThemeUI(true);
    } else {
      setThemeUI(false);
    }

    // ------------------- RTL TOGGLE -------------------
    const rtlToggleBtn = document.getElementById('rtlToggleBtn');
    const rtlToggleLabel = document.getElementById('rtlToggleLabel');
    
    function updateRTLButtonUI(isRTL) {
      if (rtlToggleLabel) rtlToggleLabel.textContent = isRTL ? 'LTR' : 'RTL';
    }
    
    function toggleRTL() {
      const html = document.documentElement;
      const currentDir = html.getAttribute('dir');
      const newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
      html.setAttribute('dir', newDir);
      localStorage.setItem('dir', newDir);
      updateRTLButtonUI(newDir === 'rtl');
      
      const submitArrow = document.querySelector('#submitBtn i');
      if (submitArrow) {
        if (newDir === 'rtl') submitArrow.classList.add('slide-icon');
        else submitArrow.classList.remove('slide-icon');
      }
    }
    
    if (rtlToggleBtn) rtlToggleBtn.addEventListener('click', toggleRTL);
    
    const savedDir = localStorage.getItem('dir');
    if (savedDir === 'rtl') {
      document.documentElement.setAttribute('dir', 'rtl');
      updateRTLButtonUI(true);
      const submitArrow = document.querySelector('#submitBtn i');
      if (submitArrow) submitArrow.classList.add('slide-icon');
    } else {
      document.documentElement.setAttribute('dir', 'ltr');
      updateRTLButtonUI(false);
    }

    // ------------------- PASSWORD VISIBILITY TOGGLES -------------------
    const togglePasswordBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const toggleConfirmBtn = document.getElementById('toggleConfirmPassword');
    const confirmInput = document.getElementById('confirmPassword');
    
    if (togglePasswordBtn && passwordInput) {
      togglePasswordBtn.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        togglePasswordBtn.innerHTML = type === 'password' ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
      });
    }
    
    if (toggleConfirmBtn && confirmInput) {
      toggleConfirmBtn.addEventListener('click', () => {
        const type = confirmInput.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmInput.setAttribute('type', type);
        toggleConfirmBtn.innerHTML = type === 'password' ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
      });
    }

    // ------------------- FORM VALIDATION -------------------
    const signupForm = document.getElementById('signupForm');
    const fullnameInput = document.getElementById('fullname');
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const confirmPassInput = document.getElementById('confirmPassword');
    const termsCheckbox = document.getElementById('termsCheckbox');
    
    const fullnameError = document.getElementById('fullnameError');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const confirmError = document.getElementById('confirmError');
    const termsError = document.getElementById('termsError');
    const submitBtn = document.getElementById('submitBtn');

    // realtime remove error hints
    fullnameInput.addEventListener('input', () => {
      fullnameError.classList.add('hidden');
      fullnameInput.classList.remove('border-red-500');
    });
    emailInput.addEventListener('input', () => {
      emailError.classList.add('hidden');
      emailInput.classList.remove('border-red-500');
    });
    passInput.addEventListener('input', () => {
      passwordError.classList.add('hidden');
      passInput.classList.remove('border-red-500');
      if (confirmPassInput.value) validateConfirmPassword();
    });
    confirmPassInput.addEventListener('input', () => validateConfirmPassword());
    termsCheckbox.addEventListener('change', () => termsError.classList.add('hidden'));
    
    function validateConfirmPassword() {
      if (confirmPassInput.value && passInput.value !== confirmPassInput.value) {
        confirmError.classList.remove('hidden');
        confirmPassInput.classList.add('border-red-500');
        return false;
      } else {
        confirmError.classList.add('hidden');
        confirmPassInput.classList.remove('border-red-500');
        return true;
      }
    }

    function showToast(message, type = 'info') {
      let toastContainer = document.getElementById('toast-container');
      if (!toastContainer) {
        toastContainer = document.createElement('div');
        toastContainer.id = 'toast-container';
        toastContainer.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 z-[2000] flex flex-col items-center gap-2 pointer-events-none';
        document.body.appendChild(toastContainer);
      }
      const toast = document.createElement('div');
      let bgClass = 'bg-gray-800 dark:bg-gray-900 border-l-4 border-brand-primary';
      if (type === 'success') bgClass = 'bg-green-700 border-l-4 border-green-300';
      if (type === 'error') bgClass = 'bg-red-700 border-l-4 border-red-300';
      if (type === 'info') bgClass = 'bg-blue-700 border-l-4 border-blue-300';
      toast.className = `${bgClass} text-white px-4 py-2 rounded-xl shadow-2xl text-xs font-medium pointer-events-auto transform transition-all duration-300 flex items-center gap-2 max-w-xs md:max-w-md`;
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'} text-xs"></i><span>${message}</span>`;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(10px)';
        setTimeout(() => toast.remove(), 300);
      }, 2800);
    }

    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      let isValid = true;
      
      const fullname = fullnameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passInput.value.trim();
      const confirmPassword = confirmPassInput.value.trim();
      const termsAccepted = termsCheckbox.checked;
      
      if (!fullname) {
        fullnameError.classList.remove('hidden');
        fullnameInput.classList.add('border-red-500');
        isValid = false;
      } else {
        fullnameError.classList.add('hidden');
        fullnameInput.classList.remove('border-red-500');
      }
      
      const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
      if (!emailRegex.test(email)) {
        emailError.classList.remove('hidden');
        emailInput.classList.add('border-red-500');
        isValid = false;
      } else {
        emailError.classList.add('hidden');
        emailInput.classList.remove('border-red-500');
      }
      
      if (password.length < 6) {
        passwordError.classList.remove('hidden');
        passInput.classList.add('border-red-500');
        isValid = false;
      } else {
        passwordError.classList.add('hidden');
        passInput.classList.remove('border-red-500');
      }
      
      if (password !== confirmPassword || !confirmPassword) {
        confirmError.classList.remove('hidden');
        confirmPassInput.classList.add('border-red-500');
        isValid = false;
      } else {
        confirmError.classList.add('hidden');
        confirmPassInput.classList.remove('border-red-500');
      }
      
      if (!termsAccepted) {
        termsError.classList.remove('hidden');
        isValid = false;
      } else {
        termsError.classList.add('hidden');
      }
      
      if (isValid) {
        const originalHTML = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Creating account...';
        submitBtn.disabled = true;
        
        setTimeout(() => {
          showToast('🎉 Account created! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = 'signin.html';
          }, 1500);
        }, 1000);
      } else {
        const card = document.querySelector('.glass-card');
        if (card) {
          card.style.transform = 'translateX(4px)';
          setTimeout(() => { if(card) card.style.transform = ''; }, 100);
        }
      }
    });

    // Ensure no scrolling on desktop
    document.body.style.overflow = 'hidden';
    function checkHeight() {
      if (window.innerHeight < 550 && window.innerWidth < 768) {
        document.body.style.overflow = 'auto';
      } else {
        document.body.style.overflow = 'hidden';
      }
    }
    checkHeight();
    window.addEventListener('resize', checkHeight);
  </script>
  <style>
    #toast-container .bg-gray-800, #toast-container .bg-green-700, #toast-container .bg-red-700, #toast-container .bg-blue-700 {
      backdrop-filter: blur(8px);
    }
    /* Ensure no scrollbars on desktop */
    @media (min-width: 768px) {
      body {
        overflow: hidden !important;
      }
      .login-container {
        height: 100vh;
      }
    }
    /* For very small mobile devices, allow gentle scroll */
    @media (max-width: 767px) {
      body {
        overflow-y: auto !important;
      }
    }
    /* Dark mode body background override */
    body.dark {
      background-color: #000000 !important;
    }
  </style>
</body>
